idea:
  title: LLM Bullying
  domain: nlp
  hypothesis: 'Iterative rejection of LLM outputs as "too AI-sounding" leads to text
    that passes AI detectors more effectively than a single instruction to "sound
    less like AI," possibly due to activation of different model features or changes
    in generation regime.

    '
  background:
    description: 'If you repeatedly reject Claude''s output as "too AI-sounding,"
      the text starts passing AI detectors like Pangram after a few rounds. This works
      even when the rejected text wasn''t generated in the current conversation. The
      open question is why iterative rejection works so much better than just asking
      the model to "sound less like AI" in a single shot. One possibility is that
      the model has access to the relevant features but a simple instruction doesn''t
      activate the right steering. Another is that something about the rejection context
      itself is doing the work: the model isn''t getting better at suppressing AI
      features, it''s shifting into a different generation regime entirely.

      '
  metadata:
